# ==============================================================================
# HolyClaude — ZAI GLM-5.2
# Build:  docker compose --env-file ../../.env up -d --build
# UI:     http://localhost:3001
# ==============================================================================

services:
  sg-ontology-http:
    image: steinsgate-mcp:latest
    container_name: sg-ontology-http
    restart: unless-stopped
    ports:
      - "8093:8093"
    command:
      - sh
      - -lc
      - |
        /app/.venv/bin/python - <<'PY'
        from amadeus.mcp_server import app
        from mcp.server.fastmcp.server import TransportSecuritySettings

        app.settings.host = "0.0.0.0"
        app.settings.port = 8093
        app.settings.streamable_http_path = "/mcp"
        app.settings.transport_security = TransportSecuritySettings(
            allowed_hosts=["host.docker.internal:*", "127.0.0.1:*", "localhost:*"],
            allowed_origins=[
                "http://host.docker.internal:*",
                "http://127.0.0.1:*",
                "http://localhost:*",
            ],
        )
        app.run(transport="streamable-http")
        PY

  holyclaude:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: holyclaude
    hostname: holyclaude
    restart: unless-stopped
    shm_size: 2g                           # Chromium needs this — don't remove
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux에서 MCP HTTP 연결 필수
    cap_add:
      - SYS_ADMIN                          # Required: Chromium sandboxing
      - SYS_PTRACE                         # Required: debugging tools
    security_opt:
      - seccomp=unconfined                 # Required: Chromium in Docker
    ports:
      - "127.0.0.1:3001:3001"              # CloudCLI web UI — localhost only
    volumes:
      - ./data/claude:/home/claude/.claude # Credentials & settings — never delete
      - ./data/cloudcli:/home/claude/.cloudcli # HolyClaude UI tokens — never delete
      - ../../:/workspace                  # Project root mounted as workspace
    environment:
      - TZ=Asia/Seoul

      # ZAI GLM-5.2 — passed from .env at project root
      - ZAI_API_KEY=${ZAI_API_KEY}
      - QA_WIKI_BASE_URL=https://api.z.ai/api/coding/paas/v4
      - QA_WIKI_MODEL=glm-5.2
      - QA_WIKI_TEMPERATURE=0.1
      - QA_WIKI_TIMEOUT=360
      - QA_WIKI_MAX_RETRIES=1
      - QA_WIKI_MAX_CONCURRENCY=8

      # Claude Code → Z.AI 라우팅 (docs.z.ai/devpack/quick-start#claude-code)
      - ANTHROPIC_AUTH_TOKEN=${ZAI_API_KEY}
      - ANTHROPIC_BASE_URL=https://api.z.ai/api/anthropic
      - API_TIMEOUT_MS=3000000
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - HOLYCLAUDE_PIPELINE_MODEL=glm-5.2

  sg-wiki-admin:
    build: ./admin/
    container_name: sg-wiki-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - ../../:/workspace
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=Asia/Seoul
      - WORKSPACE=/workspace
      - ADMIN_RUNS_DIR=/workspace/.admin/runs
      - R2_MOCK=${R2_MOCK:-1}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY:-}
      - R2_SECRET_KEY=${R2_SECRET_KEY:-}
