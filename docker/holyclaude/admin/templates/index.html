<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SG Wiki 관리자</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      color: #58a6ff;
      margin-bottom: 24px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 20px;
    }

    .card h2 {
      font-size: 0.95rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .btn {
      display: inline-block;
      padding: 7px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover { background: #30363d; border-color: #8b949e; }
    .btn:active { background: #161b22; }

    .btn-primary {
      background: #1f6feb;
      border-color: #388bfd;
      color: #fff;
    }
    .btn-primary:hover { background: #388bfd; }

    .btn-danger {
      background: #da3633;
      border-color: #f85149;
      color: #fff;
    }
    .btn-danger:hover { background: #f85149; }

    .btn-success {
      background: #238636;
      border-color: #3fb950;
      color: #fff;
    }
    .btn-success:hover { background: #3fb950; }

    .btn + .btn { margin-left: 8px; }

    .msg {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    .msg.show { display: block; }
    .msg.ok  { background: #0d2a17; border: 1px solid #238636; color: #3fb950; }
    .msg.err { background: #2a0d0d; border: 1px solid #da3633; color: #f85149; }
    .msg.info { background: #0d1b2a; border: 1px solid #1f6feb; color: #58a6ff; }

    /* Cron section */
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .row label { color: #8b949e; font-size: 12px; white-space: nowrap; }

    input[type="text"] {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      padding: 6px 10px;
      font-size: 13px;
      width: 140px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #58a6ff; }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-badge.on  { background: #0d2a17; color: #3fb950; border: 1px solid #238636; }
    .status-badge.off { background: #2a0d0d; color: #f85149; border: 1px solid #da3633; }

    /* Status table */
    .full-card { grid-column: 1 / -1; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      text-align: left;
      padding: 8px 10px;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
      font-weight: 500;
    }

    tbody tr:hover { background: #1c2129; }

    tbody td {
      padding: 7px 10px;
      border-bottom: 1px solid #161b22;
      color: #c9d1d9;
    }

    .num { text-align: right; }
    .zero { color: #30363d; }

    .refresh-hint {
      font-size: 11px;
      color: #484f58;
      margin-top: 8px;
    }

    /* Log terminal */
    .terminal {
      background: #010409;
      border: 1px solid #21262d;
      border-radius: 6px;
      font-family: 'Consolas', 'Menlo', monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #c9d1d9;
      height: 320px;
      overflow-y: auto;
      padding: 10px 12px;
    }
    .terminal .log-line { white-space: pre-wrap; word-break: break-all; }
    .terminal .log-line:hover { background: #1c2129; }
    .log-controls {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; }
    .dot.live { background: #3fb950; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

    /* Tooltip */
    .tip {
      position: relative;
      display: inline-block;
    }
    .tip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1c2129;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 12px;
      line-height: 1.5;
      padding: 8px 12px;
      white-space: pre-line;
      width: 260px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .tip::before {
      content: '';
      position: absolute;
      bottom: calc(100% + 3px);
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #30363d;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .tip:hover::after,
    .tip:hover::before { opacity: 1; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>SG Wiki 관리자 &mdash; 슈타인즈 게이트 위키</h1>

<div class="grid">

  <!-- 섹션 1: 수동 실행 -->
  <div class="card">
    <h2>수동 실행</h2>
    <div>
      <span class="tip" data-tip="콘텐츠 생성 파이프라인&#10;① wiki/ 현황 vs qaset 비교 → 미작성 주제 선정&#10;② wiki-planner: 기획서 작성 (병렬)&#10;③ wiki-writer: 페이지 초안 작성 (병렬)&#10;④ source-sanitizer: 내부 경로·청크 ID 유출 검사&#10;⑤ 팀장 검토 → git commit → Pages 배포">
        <button class="btn btn-primary" onclick="triggerPipeline(1)">파이프라인 1 실행</button>
      </span>
      <span class="tip" data-tip="제안 처리 파이프라인&#10;① R2 폴링 → suggestions/inbox/ 저장 (멱등)&#10;② wiki-classifier: Type A(주제 요청) / B(편집 제안) 분류&#10;③ suggestion-judge: MCP 조회 후 승인·거부·피드백 판정&#10;④ decisions/{id}.json 저장&#10;⑤ 히스토리 탭 반영 → Pages 재배포">
        <button class="btn btn-success" onclick="triggerPipeline(2)">파이프라인 2 실행</button>
      </span>
    </div>
    <div id="trigger-msg" class="msg"></div>
  </div>

  <!-- 섹션 2: Cron 스케줄 -->
  <div class="card">
    <h2>Cron 스케줄</h2>
    <div class="row">
      <label for="cron-expr">Cron 표현식</label>
      <input type="text" id="cron-expr" value="0 * * * *" placeholder="0 * * * *">
    </div>
    <div class="row">
      <span>상태:</span>
      <span id="sched-badge" class="status-badge off">비활성</span>
    </div>
    <div style="margin-top:12px">
      <button class="btn btn-success" onclick="setSchedule(true)">활성화</button>
      <button class="btn btn-danger"  onclick="setSchedule(false)">비활성화</button>
    </div>
    <div id="sched-msg" class="msg"></div>
  </div>

  <!-- 섹션 3: 진행 중인 작업 -->
  <div class="card">
    <h2>진행 중인 작업</h2>
    <div id="running-body" style="color:#484f58;font-size:12px">확인 중...</div>
    <p class="refresh-hint">3초마다 자동 갱신</p>
  </div>

  <!-- 섹션 4: 위키 현황 -->
  <div class="card">
    <h2>위키 페이지 현황</h2>
    <div id="wiki-body" style="color:#484f58;font-size:12px">확인 중...</div>
    <p class="refresh-hint">30초마다 자동 갱신</p>
  </div>

  <!-- 섹션 5: 에이전트 로그 -->
  <div class="card full-card">
    <div class="log-controls">
      <span class="dot" id="log-dot"></span>
      <h2 style="margin-bottom:0">에이전트 로그 <span style="color:#484f58;font-size:11px;font-weight:normal;text-transform:none;letter-spacing:0">(holyclaude)</span></h2>
      <button class="btn" style="margin-left:auto;font-size:11px;padding:4px 10px" onclick="reconnectLog()">재연결</button>
      <button class="btn" style="font-size:11px;padding:4px 10px" onclick="clearLog()">지우기</button>
    </div>
    <div class="terminal" id="log-terminal"></div>
  </div>

  <!-- 섹션 6: 실행 현황 -->
  <div class="card full-card">
    <h2>실행 현황</h2>
    <table>
      <thead>
        <tr>
          <th>타임스탬프</th>
          <th class="num">처리됨</th>
          <th class="num">스킵됨</th>
          <th class="num">오류</th>
        </tr>
      </thead>
      <tbody id="runs-body">
        <tr><td colspan="4" style="color:#484f58;text-align:center;padding:20px">불러오는 중...</td></tr>
      </tbody>
    </table>
    <p class="refresh-hint">10초마다 자동 갱신</p>
  </div>

</div>

<script>
  // ── Trigger ──────────────────────────────────────────────────────────────
  async function triggerPipeline(n) {
    const msg = document.getElementById('trigger-msg');
    showMsg(msg, 'info', '<span class="spinner"></span>파이프라인 ' + n + ' 실행 중...');
    try {
      const res = await fetch('/trigger/p' + n, { method: 'POST' });
      const data = await res.json();
      if (res.ok) {
        showMsg(msg, 'ok', JSON.stringify(data, null, 2));
      } else {
        showMsg(msg, 'err', JSON.stringify(data, null, 2));
      }
    } catch (e) {
      showMsg(msg, 'err', '요청 실패: ' + e.message);
    }
  }

  // ── Schedule ─────────────────────────────────────────────────────────────
  async function setSchedule(enabled) {
    const cron = document.getElementById('cron-expr').value.trim();
    const msg  = document.getElementById('sched-msg');
    showMsg(msg, 'info', '<span class="spinner"></span>스케줄 업데이트 중...');
    try {
      const res = await fetch('/schedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cron, enabled })
      });
      const data = await res.json();
      if (res.ok) {
        showMsg(msg, 'ok', JSON.stringify(data, null, 2));
        updateBadge(enabled);
      } else {
        showMsg(msg, 'err', JSON.stringify(data, null, 2));
      }
    } catch (e) {
      showMsg(msg, 'err', '요청 실패: ' + e.message);
    }
  }

  async function loadSchedule() {
    try {
      const res  = await fetch('/schedule');
      const data = await res.json();
      const jobs = data.jobs ?? [];
      const active = jobs.length > 0;
      updateBadge(active);
    } catch (_) {}
  }

  function updateBadge(on) {
    const b = document.getElementById('sched-badge');
    b.textContent = on ? '활성' : '비활성';
    b.className   = 'status-badge ' + (on ? 'on' : 'off');
  }

  // ── Running jobs ─────────────────────────────────────────────────────────
  async function loadRunning() {
    try {
      const res  = await fetch('/running');
      const data = await res.json();
      const jobs = data.jobs ?? [];
      const el   = document.getElementById('running-body');
      if (jobs.length === 0) {
        el.innerHTML = '<span style="color:#484f58">실행 중인 작업 없음</span>';
        return;
      }
      el.innerHTML = jobs.map(j => `
        <div style="display:grid;grid-template-columns:16px 1fr;gap:8px;margin-bottom:8px">
          <span class="spinner" style="margin-top:2px"></span>
          <div>
            <div><b style="color:#c9d1d9">파이프라인 ${j.pipeline?.replace('p','')}</b>
            &nbsp;<span style="color:#484f58">${j.run_id}</span>
            &nbsp;<span style="color:#8b949e">${j.started_at?.slice(11,19) ?? ''}</span></div>
            <div style="color:#8b949e;font-size:11px;line-height:1.5">${j.last_line ?? ''}</div>
          </div>
        </div>`).join('');
    } catch (e) {
      document.getElementById('running-body').textContent = '로드 실패: ' + e.message;
    }
  }

  // ── Wiki status ───────────────────────────────────────────────────────────
  async function loadWikiStatus() {
    try {
      const res  = await fetch('/wiki-status');
      const data = await res.json();
      const el   = document.getElementById('wiki-body');
      const sections = data.sections ?? {};
      const total    = data.total ?? 0;
      const sugg     = data.suggestions ?? {};

      const sectionHtml = Object.entries(sections).map(([sec, pages]) => `
        <div style="margin-bottom:8px">
          <div style="color:#8b949e;margin-bottom:3px">${sec} <span style="color:#484f58">(${pages.length})</span></div>
          <div style="padding-left:8px;color:#c9d1d9;font-size:11px;line-height:1.7">
            ${pages.map(p => `<span style="margin-right:8px">• ${p}</span>`).join('')}
          </div>
        </div>`).join('');

      el.innerHTML = `
        <div style="margin-bottom:12px;font-size:13px">
          총 <b style="color:#58a6ff">${total}</b>페이지
          &nbsp;·&nbsp;대기 제안 <b style="color:#f0883e">${sugg.inbox ?? 0}</b>건
          &nbsp;·&nbsp;처리 완료 <b style="color:#3fb950">${sugg.processed ?? 0}</b>건
        </div>
        ${total === 0 ? '<span style="color:#484f58">wiki/ 디렉토리가 비어 있습니다</span>' : sectionHtml}`;
    } catch (e) {
      document.getElementById('wiki-body').textContent = '로드 실패: ' + e.message;
    }
  }

  // ── Status table ─────────────────────────────────────────────────────────
  async function loadStatus() {
    try {
      const res  = await fetch('/status');
      const data = await res.json();
      const runs = data.runs ?? [];
      const tbody = document.getElementById('runs-body');
      if (runs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="color:#484f58;text-align:center;padding:20px">실행 기록 없음</td></tr>';
        return;
      }
      tbody.innerHTML = runs.map(r => {
        const ts  = r.timestamp || '-';
        const pro = Array.isArray(r.processed) ? r.processed.length : (r.processed ?? 0);
        const ski = Array.isArray(r.skipped)   ? r.skipped.length   : (r.skipped   ?? 0);
        const err = Array.isArray(r.errors)    ? r.errors.length    : (r.errors    ?? 0);
        return `<tr>
          <td>${ts}</td>
          <td class="num">${pro}</td>
          <td class="num ${ski === 0 ? 'zero' : ''}">${ski}</td>
          <td class="num ${err === 0 ? 'zero' : 'err-cell'}">${err}</td>
        </tr>`;
      }).join('');
    } catch (e) {
      document.getElementById('runs-body').innerHTML =
        '<tr><td colspan="4" style="color:#f85149;text-align:center;padding:20px">로드 실패: ' + e.message + '</td></tr>';
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showMsg(el, type, html) {
    el.className = 'msg show ' + type;
    el.innerHTML = html;
  }

  // ── Log stream ────────────────────────────────────────────────────────────
  let logEs = null;
  const MAX_LOG_LINES = 500;

  function connectLog() {
    if (logEs) logEs.close();
    const term = document.getElementById('log-terminal');
    const dot  = document.getElementById('log-dot');
    dot.classList.remove('live');

    logEs = new EventSource('/logs/stream?tail=200');

    logEs.onopen = () => { dot.classList.add('live'); };

    logEs.onmessage = (e) => {
      const text = JSON.parse(e.data);
      if (!text) return;                        // keepalive empty string
      const div = document.createElement('div');
      div.className = 'log-line';
      div.textContent = text;
      term.appendChild(div);
      // cap line count
      while (term.children.length > MAX_LOG_LINES) term.removeChild(term.firstChild);
      // auto-scroll only when near bottom
      if (term.scrollHeight - term.scrollTop - term.clientHeight < 60) {
        term.scrollTop = term.scrollHeight;
      }
    };

    logEs.onerror = () => {
      dot.classList.remove('live');
      setTimeout(connectLog, 5000);  // auto-reconnect
    };
  }

  function reconnectLog() { connectLog(); }
  function clearLog() { document.getElementById('log-terminal').innerHTML = ''; }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadSchedule();
  loadStatus();
  loadRunning();
  loadWikiStatus();
  connectLog();
  setInterval(loadStatus,     10000);
  setInterval(loadRunning,     3000);
  setInterval(loadWikiStatus, 30000);
</script>

</body>
</html>
