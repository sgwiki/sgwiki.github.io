name = "sg-wiki-suggest"
main = "suggest.ts"
compatibility_date = "2024-09-23"

# Secret: wrangler secret put HCAPTCHA_SECRET

[[r2_buckets]]
binding = "SUGGESTIONS"
bucket_name = "sg-wiki-suggestions"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
# wrangler kv namespace create RATE_LIMIT  →  id를 위 값에 입력

[env.production]
name = "sg-wiki-suggest"

[env.preview]
name = "sg-wiki-suggest-preview"
